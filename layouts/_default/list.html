{{ define "main" }}
<section class="section-list" aria-label="{{ .Title }}">
  <header>
    <h1>{{ .Title }}</h1>
    {{- with .Params.subtitle }}
    <p class="section-subtitle">{{ . }}</p>
    {{- end }}
    {{- with .Content }}
    <div id="intro">{{ . }}</div>
    {{- end }}
  </header>
  <div id="posts" class="section">
    {{- range (.Pages.ByDate.Reverse) }}
    <div class="post-row">
      <p class="post-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></p>
      <p class="post-date"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 January 2006" }}</time></p>
    </div>
    {{- with .Params.subtitle }}
    <p class="post-subtitle">{{ . }}</p>
    {{- end }}
    {{- end }}
  </div>
</section>
{{ end }}
